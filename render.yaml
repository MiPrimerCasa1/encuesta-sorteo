# Producción principal: VPS + .github/workflows/deploy-vps.yml (push a main).
# Render queda como respaldo; desactivar autoDeploy si migraste DNS al VPS.
services:
  - type: web
    name: encuesta-mi-primera-casa
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: false
