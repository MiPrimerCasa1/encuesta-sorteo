# Usar junto al stack Traefik de /root:
#   docker compose -f /root/docker-compose.yml -f /opt/encuesta-landingqr/deploy/docker-compose.traefik-root.yml up -d --build encuesta
services:
  encuesta:
    build:
      context: /opt/encuesta-landingqr
      dockerfile: Dockerfile
    container_name: encuesta-landingqr
    restart: unless-stopped
    env_file:
      - /opt/encuesta-landingqr/.env
    environment:
      NODE_ENV: production
      PORT: "3001"
    expose:
      - "3001"
    networks:
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.encuestawww.rule=Host(`www.miprimercasafsa-sorteo.com`)
      - traefik.http.routers.encuestawww.entrypoints=web,websecure
      - traefik.http.routers.encuestawww.tls=true
      - traefik.http.routers.encuestawww.tls.certresolver=myhttpchallenge
      - traefik.http.routers.encuestawww.service=encuesta
      - traefik.http.middlewares.encuesta-compress.compress=true
      - traefik.http.routers.encuestawww.middlewares=encuesta-compress@docker
      - traefik.http.routers.encuestaapex.rule=Host(`miprimercasafsa-sorteo.com`)
      - traefik.http.routers.encuestaapex.entrypoints=web,websecure
      - traefik.http.routers.encuestaapex.tls=true
      - traefik.http.routers.encuestaapex.tls.certresolver=myhttpchallenge
      - traefik.http.routers.encuestaapex.service=encuesta
      - traefik.http.routers.encuestaapex.middlewares=encuesta-compress@docker
      - traefik.http.services.encuesta.loadbalancer.server.port=3001
    volumes:
      - encuesta_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  encuesta_logs:
