# Copiar a: /etc/nginx/sites-available/encuesta
# Enlazar: ln -sf /etc/nginx/sites-available/encuesta /etc/nginx/sites-enabled/
# Probar: nginx -t && systemctl reload nginx
#
# Reemplazar SERVER_NAME por tu dominio (ej. www.miprimercasafsa-sorteo.com)

server {
    listen 80;
    server_name www.miprimercasafsa-sorteo.com miprimercasafsa-sorteo.com;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
