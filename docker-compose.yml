# Producción en VPS con Traefik existente (root-traefik-1 en puertos 80/443).
# Uso: cp .env.docker.example .env  → editar .env → docker compose up -d --build

services:
  encuesta:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encuesta-landingqr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3001"
    expose:
      - "3001"
    networks:
      - root_default
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.encuestawww.rule=Host(`www.miprimercasafsa-sorteo.com`)
      - traefik.http.routers.encuestawww.entrypoints=web,websecure
      - traefik.http.routers.encuestawww.tls=true
      - traefik.http.routers.encuestawww.tls.certresolver=myhttpchallenge
      - traefik.http.routers.encuestawww.service=encuesta
      - traefik.http.routers.encuestaapex.rule=Host(`miprimercasafsa-sorteo.com`)
      - traefik.http.routers.encuestaapex.entrypoints=web,websecure
      - traefik.http.routers.encuestaapex.tls=true
      - traefik.http.routers.encuestaapex.tls.certresolver=myhttpchallenge
      - traefik.http.routers.encuestaapex.service=encuesta
      - traefik.http.services.encuesta.loadbalancer.server.port=3001
    volumes:
      - encuesta_logs:/app/logs

networks:
  root_default:
    external: true

volumes:
  encuesta_logs:
