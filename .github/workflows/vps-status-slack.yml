# Reporte periódico del VPS a Slack (Incoming Webhook).
# Secret en environment production: SLACK_WEBHOOK_URL
# Webhook: https://api.slack.com/messaging/webhooks

name: VPS status → Slack

on:
  schedule:
    # 08:00, 14:00 y 20:00 UTC (~5 / 11 / 17 hs Argentina UTC-3)
    - cron: "0 8,14,20 * * *"
  workflow_dispatch:

concurrency:
  group: vps-status-slack
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recolectar estado del VPS
        id: collect
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          STATUS=$(ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/vps_key \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' \
            < deploy/vps-status-collect.sh)
          echo "status<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$STATUS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Enviar a Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          chmod +x .github/scripts/send-slack.sh
          TITLE="📊 VPS encuesta · $(date -u '+%Y-%m-%d %H:%M UTC')"
          .github/scripts/send-slack.sh "$TITLE" "${{ steps.collect.outputs.status }}"
