# Respaldo opcional en GitHub Pages (NO es producción).
# Producción: deploy-vps.yml → VPS + dominio propio.
# Este workflow solo corre manualmente; requiere Pages activado en:
# https://github.com/MiPrimerCasa/encuesta-sorteo/settings/pages

name: Deploy Frontend to GitHub Pages (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_BASE: /encuesta-mi-primera-casa/
        run: npm run compilar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
